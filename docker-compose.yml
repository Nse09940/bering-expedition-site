services:
  traefik:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bering}
      POSTGRES_USER: ${POSTGRES_USER:-bering}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bering}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - .env.example
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/backend:/app
    depends_on:
      - postgres
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend-api.rule=Host(`history.dymnikov.tech`) && PathPrefix(`/api`)
      - traefik.http.routers.backend-api.entrypoints=websecure
      - traefik.http.routers.backend-api.tls=true
      - traefik.http.routers.backend-api.tls.certresolver=le
      - traefik.http.routers.backend-api.priority=120
      - traefik.http.routers.backend-docs.rule=Host(`history.dymnikov.tech`) && (PathPrefix(`/docs`) || PathPrefix(`/openapi.json`) || PathPrefix(`/redoc`))
      - traefik.http.routers.backend-docs.entrypoints=websecure
      - traefik.http.routers.backend-docs.tls=true
      - traefik.http.routers.backend-docs.tls.certresolver=le
      - traefik.http.routers.backend-docs.priority=120
      - traefik.http.routers.backend-admin.rule=Host(`history.dymnikov.tech`) && PathPrefix(`/admin`)
      - traefik.http.routers.backend-admin.entrypoints=websecure
      - traefik.http.routers.backend-admin.tls=true
      - traefik.http.routers.backend-admin.tls.certresolver=le
      - traefik.http.routers.backend-admin.priority=120
      - traefik.http.services.backend.loadbalancer.server.port=8000

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://history.dymnikov.tech/api}
    command: pnpm --filter web dev --hostname 0.0.0.0
    volumes:
      - .:/app
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`history.dymnikov.tech`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.tls.certresolver=le
      - traefik.http.routers.web.priority=10
      - traefik.http.services.web.loadbalancer.server.port=3000

volumes:
  postgres_data:
  minio_data:
  traefik_letsencrypt:
