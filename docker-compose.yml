services:
  traefik:
    image: traefik:v3.6.14
    restart: always
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt

  postgres:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bering}
      POSTGRES_USER: ${POSTGRES_USER:-bering}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bering}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - path: .env
        required: false
      - .env.example
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend-api.rule=Host(`${APP_DOMAIN:-history.dymnikov.tech}`) && PathPrefix(`/api`)
      - traefik.http.routers.backend-api.entrypoints=websecure
      - traefik.http.routers.backend-api.tls=true
      - traefik.http.routers.backend-api.tls.certresolver=le
      - traefik.http.routers.backend-api.priority=120
      - traefik.http.services.backend.loadbalancer.server.port=8000

  django-admin:
    build:
      context: ./apps/admin-django
      dockerfile: Dockerfile
    restart: always
    env_file:
      - path: .env
        required: false
      - .env.example
    volumes:
      - django_admin_data:/data
    ports:
      - "8010:8010"
    labels:
      - traefik.enable=true
      - traefik.http.routers.django-admin.rule=Host(`${APP_DOMAIN:-history.dymnikov.tech}`) && PathPrefix(`/admin`)
      - traefik.http.routers.django-admin.entrypoints=websecure
      - traefik.http.routers.django-admin.tls=true
      - traefik.http.routers.django-admin.tls.certresolver=le
      - traefik.http.routers.django-admin.priority=125
      - traefik.http.services.django-admin.loadbalancer.server.port=8010

  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    restart: always
    env_file:
      - path: .env
        required: false
      - .env.example
    ports:
      - "3001:3001"
    labels:
      - traefik.enable=true
      - traefik.http.routers.docs.rule=Host(`${APP_DOMAIN:-history.dymnikov.tech}`) && PathPrefix(`/docs`)
      - traefik.http.routers.docs.entrypoints=websecure
      - traefik.http.routers.docs.tls=true
      - traefik.http.routers.docs.tls.certresolver=le
      - traefik.http.routers.docs.priority=130
      - traefik.http.services.docs.loadbalancer.server.port=3001

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    env_file:
      - path: .env
        required: false
      - .env.example
    environment:
      INTERNAL_API_URL: http://backend:8000/api
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend
      - django-admin
      - docs
    ports:
      - "3000:3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`${APP_DOMAIN:-history.dymnikov.tech}`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.tls.certresolver=le
      - traefik.http.routers.web.priority=10
      - traefik.http.services.web.loadbalancer.server.port=3000

volumes:
  postgres_data:
  minio_data:
  traefik_letsencrypt:
  django_admin_data:
